kind = "web"
previewPath = "/"
title = "EcoSphere ESG Platform"
version = "1.0.0"
id = "frontend/ecosphere"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24402

[services.development]
run = "pnpm --filter @workspace/ecosphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecosphere", "run", "build" ]
serve = "static"
publicDir = "frontend/ecosphere/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24402"
BASE_PATH = "/"
